services:
  - type: web
    name: nse-swing-scanner
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn nse_scanner_api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
